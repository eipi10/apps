name: Deploy Interleaved Practice Timer

on:
  push:
    branches: [main]
    paths:
      - "interleaved-practice-timer/**"
      - ".github/workflows/pages.yml"
      - ".github/workflows/jekyll-gh-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: interleaved-practice-timer
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: interleaved-practice-timer/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test
      - run: pnpm run build
      - name: Assemble Pages site
        run: |
          mkdir -p ../_site/interleaved-practice-timer
          cp -R dist/. ../_site/interleaved-practice-timer/
          cat > ../_site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>eipi10 Apps</title>
              <style>
                :root {
                  color: #17211d;
                  background: #f6f2e9;
                  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                }
                body {
                  margin: 0;
                  min-height: 100vh;
                  display: grid;
                  place-items: center;
                  padding: 24px;
                }
                main {
                  width: min(720px, 100%);
                  border: 1px solid #d6cbb8;
                  border-radius: 8px;
                  background: #fffaf0;
                  padding: 32px;
                  box-shadow: 0 14px 40px rgba(49, 41, 29, 0.08);
                }
                h1 {
                  margin: 0 0 10px;
                  font-size: clamp(2rem, 8vw, 4rem);
                  line-height: 1;
                }
                p {
                  color: #5c5143;
                  font-size: 1.05rem;
                  line-height: 1.6;
                }
                a {
                  display: inline-flex;
                  margin-top: 14px;
                  border-radius: 8px;
                  background: #2f6f54;
                  color: white;
                  padding: 12px 16px;
                  font-weight: 800;
                  text-decoration: none;
                }
              </style>
            </head>
            <body>
              <main>
                <h1>eipi10 Apps</h1>
                <p>Small experimental utility apps.</p>
                <a href="./interleaved-practice-timer/">Open Interleaved Practice Timer</a>
              </main>
            </body>
          </html>
          HTML
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
